<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gældsknuser">
    <meta name="theme-color" content="#121212">
    
    <title>Gældsknuseren</title>
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
            --accent-green: #00e676;
            --accent-blue: #2979ff;
            --accent-gold: #ffd700;
            --danger: #ff1744;
            --radius: 12px;
        }
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            padding-bottom: env(safe-area-inset-bottom, 30px);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        h1, h2, h3 { margin-top: 0; margin-bottom: 15px; }
        
        .card {
            background: var(--panel-bg);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .flex-row { display: flex; gap: 15px; }
        .flex-col { flex: 1; }
        
        .metric { font-size: 28px; font-weight: bold; color: var(--accent-green); }
        .metric.blue { color: var(--accent-blue); }
        .metric-label { font-size: 14px; color: var(--text-muted); margin-bottom: 5px; }
        .small-text { font-size: 12px; color: var(--text-muted); text-align: right; margin-top: 5px; }
        
        .progress-container {
            width: 100%;
            background-color: #333;
            border-radius: 8px;
            overflow: hidden;
            height: 24px;
            margin-top: 10px;
        }
        .progress-bar {
            height: 100%;
            background-color: var(--accent-green);
            width: 0%;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        input, select, button {
            width: 100%;
            padding: 14px 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #444;
            background: #2c2c2c;
            color: white;
            font-size: 16px;
            -webkit-appearance: none;
        }
        input:focus, select:focus { outline: 2px solid var(--accent-blue); border-color: transparent; }
        
        button {
            background-color: var(--accent-blue);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-bottom: 0;
        }
        button:active { opacity: 0.8; transform: scale(0.98); }
        .btn-secondary { background-color: #333; }
        .btn-delete { 
            background-color: transparent; 
            color: var(--danger); 
            border: 1px solid var(--danger);
            padding: 4px 8px;
            border-radius: 4px;
            width: auto;
            font-size: 12px;
            margin: 0;
        }
        
        .log-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #333;
        }
        .log-item:last-child { border-bottom: none; }
        .log-info { display: flex; flex-direction: column; }
        .log-amount { font-weight: bold; font-size: 16px; }
        .type-ekstra { color: var(--accent-green); }
        .type-fast { color: var(--text-muted); }
        .log-actions { display: flex; align-items: center; gap: 10px; }

        /* Badges Styling */
        .badges-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            text-align: center;
        }
        .badge {
            background: #2c2c2c;
            border-radius: 8px;
            padding: 10px;
            border: 2px solid #444;
            transition: all 0.5s ease;
            opacity: 0.4;
            filter: grayscale(100%);
        }
        .badge.unlocked {
            opacity: 1;
            filter: grayscale(0%);
            border-color: var(--accent-gold);
            background: rgba(255, 215, 0, 0.1);
        }
        .badge-icon { font-size: 24px; margin-bottom: 5px; }
        .badge-title { font-size: 12px; font-weight: bold; color: white; }
        .badge-desc { font-size: 10px; color: var(--text-muted); margin-top: 4px; }
        
    </style>
</head>
<body>

    <div class="card">
        <h2>🔥 Level <span id="currentLevel">0</span> / 100</h2>
        <div class="metric-label">Næste mål: Slet 1.272 kr. af hovedstolen.</div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="small-text">
            Afdraget i alt: <span id="totalPaid">0</span> / 127.192 kr.
        </div>
    </div>

    <div class="card flex-row">
        <div class="flex-col">
            <div class="metric-label">Renter Sparet</div>
            <div class="metric" id="interestSaved">0 kr.</div>
        </div>
        <div class="flex-col">
            <div class="metric-label">Tid Slettet</div>
            <div class="metric blue" id="timeSaved">0 Dage</div>
        </div>
    </div>

    <div class="card">
        <h3>Trofærum</h3>
        <div class="badges-container">
            <div class="badge" id="badge-100k">
                <div class="badge-icon">🛡️</div>
                <div class="badge-title">100K Klubben</div>
                <div class="badge-desc">Gæld under 100.000</div>
            </div>
            <div class="badge" id="badge-time">
                <div class="badge-icon">⏳</div>
                <div class="badge-title">Tidsrejse</div>
                <div class="badge-desc">Slettet 365 dage</div>
            </div>
            <div class="badge" id="badge-hattrick">
                <div class="badge-icon">⚡</div>
                <div class="badge-title">Hattrick</div>
                <div class="badge-desc">3 x Ekstra på 30 dage</div>
            </div>
        </div>
    </div>

    <div class="card">
        <h3>Indsæt Betaling</h3>
        <input type="number" id="amount" placeholder="Beløb (kr.)" inputmode="decimal" required>
        <select id="type">
            <option value="ekstra">Ekstra (Gave, salg, overskud)</option>
            <option value="fast">Fast (1.250 kr. budget)</option>
        </select>
        <input type="text" id="source" placeholder="Hvor kom pengene fra?">
        <button onclick="addPayment()">🚀 KNUS GÆLD</button>
    </div>

    <div class="card">
        <h3>Seneste Sejre</h3>
        <div id="logContainer"></div>
    </div>

    <div class="card">
        <h3>System</h3>
        <button class="btn-secondary" onclick="exportData()">💾 Eksportér Backup (.csv)</button>
    </div>

    <script>
        // Systemkonstanter
        const PRINCIPAL = 127192.81;
        const BLOCK_SIZE = PRINCIPAL / 100; 
        const INTEREST_MULTIPLIER = 0.5; 
        const DAYS_SAVED_PER_KR = 30 / 1000; 
        const MAGIC_100K_THRESHOLD = PRINCIPAL - 100000; // Beløb der skal afdrages for at ramme 100k restgæld

        let payments = [];

        function init() {
            try {
                const savedData = localStorage.getItem('debtTracker');
                if (savedData) payments = JSON.parse(savedData);
            } catch (e) { console.error(e); }
            updateUI(false);
        }

        function saveData() { localStorage.setItem('debtTracker', JSON.stringify(payments)); }

        // Konfetti Maskine
        function fireConfetti() {
            const colors = ['#00e676', '#2979ff', '#ffd700', '#ff1744'];
            for (let i = 0; i < 60; i++) {
                const confetti = document.createElement('div');
                confetti.style.position = 'fixed';
                confetti.style.width = '8px';
                confetti.style.height = '16px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.top = '-20px';
                confetti.style.zIndex = '9999';
                confetti.style.pointerEvents = 'none';
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                document.body.appendChild(confetti);

                const duration = Math.random() * 2000 + 1500;
                const animation = confetti.animate([
                    { transform: `translate3d(0,0,0) rotate(0deg)`, opacity: 1 },
                    { transform: `translate3d(${Math.random()*200 - 100}px, 100vh, 0) rotate(${Math.random()*720}deg)`, opacity: 0 }
                ], { duration: duration, easing: 'cubic-bezier(.37,0,.63,1)' });

                animation.onfinish = () => confetti.remove();
            }
        }

        // Dato parser (DD-MM-YYYY til Date objekt)
        function parseDKDate(dateString) {
            const parts = dateString.split('-');
            if(parts.length === 3) return new Date(parts[2], parts[1] - 1, parts[0]);
            return new Date(dateString); // Fallback
        }

        function addPayment() {
            const amountInput = document.getElementById('amount');
            const typeInput = document.getElementById('type');
            const sourceInput = document.getElementById('source');

            const amountText = amountInput.value.replace(',', '.');
            const amount = parseFloat(amountText);
            
            if (isNaN(amount) || amount <= 0) return alert("Indtast venligst et positivt beløb.");

            // Hent level før indbetaling
            const prevTotal = payments.reduce((sum, p) => sum + p.amount, 0);
            const prevLevel = Math.floor(prevTotal / BLOCK_SIZE);

            const payment = {
                id: Date.now().toString(),
                date: new Date().toLocaleDateString('da-DK').replace(/\./g, '-'), // Sikrer DD-MM-YYYY
                amount: amount,
                type: typeInput.value,
                source: sourceInput.value.trim() || (typeInput.value === 'fast' ? 'Månedlig' : 'Ekstra')
            };

            payments.unshift(payment); 
            saveData();

            amountInput.value = '';
            sourceInput.value = '';
            if(window.innerWidth > 768) amountInput.focus(); 

            // Tjek om vi skal fyre konfetti (Level up ELLER ekstra indbetaling)
            const newTotal = payments.reduce((sum, p) => sum + p.amount, 0);
            const newLevel = Math.floor(newTotal / BLOCK_SIZE);
            if (typeInput.value === 'ekstra' || newLevel > prevLevel) {
                fireConfetti();
            }

            updateUI(true);
        }

        function deletePayment(id) {
            if(confirm("Er du sikker på, du vil slette denne?")) {
                payments = payments.filter(p => p.id !== id);
                saveData();
                updateUI(false);
            }
        }

        function updateUI(animate) {
            let totalPaid = 0;
            let extraPaid = 0;

            payments.forEach(p => {
                totalPaid += p.amount;
                if (p.type === 'ekstra') extraPaid += p.amount;
            });

            // Metrikker
            const currentLevel = Math.floor(totalPaid / BLOCK_SIZE);
            const progressPercent = ((totalPaid % BLOCK_SIZE) / BLOCK_SIZE) * 100;
            const interestSaved = extraPaid * INTEREST_MULTIPLIER;
            const daysSaved = extraPaid * DAYS_SAVED_PER_KR;

            const dkFormatter = new Intl.NumberFormat('da-DK', { maximumFractionDigits: 0 });

            document.getElementById('currentLevel').innerText = Math.min(currentLevel, 100);
            document.getElementById('progressBar').style.width = `${Math.min(progressPercent, 100)}%`;
            document.getElementById('totalPaid').innerText = dkFormatter.format(totalPaid);
            document.getElementById('interestSaved').innerText = dkFormatter.format(interestSaved) + ' kr.';
            
            let timeText = `${Math.floor(daysSaved)} Dage`;
            if (daysSaved > 30) {
                const months = Math.floor(daysSaved / 30);
                const days = Math.floor(daysSaved % 30);
                timeText = `${months} Mdr, ${days} Dage`;
            }
            document.getElementById('timeSaved').innerText = timeText;

            // Badges Evaluering
            evaluateBadges(totalPaid, daysSaved);
            renderLog(dkFormatter);
        }

        function evaluateBadges(totalPaid, daysSaved) {
            // 1. 100K Klubben
            const badge100k = document.getElementById('badge-100k');
            if (totalPaid >= MAGIC_100K_THRESHOLD) badge100k.classList.add('unlocked');
            else badge100k.classList.remove('unlocked');

            // 2. Tidsrejse
            const badgeTime = document.getElementById('badge-time');
            if (daysSaved >= 365) badgeTime.classList.add('unlocked');
            else badgeTime.classList.remove('unlocked');

            // 3. Hattrick
            const badgeHattrick = document.getElementById('badge-hattrick');
            const extraPayments = payments.filter(p => p.type === 'ekstra');
            let hasHattrick = false;
            
            if (extraPayments.length >= 3) {
                for (let i = 0; i <= extraPayments.length - 3; i++) {
                    const date1 = parseDKDate(extraPayments[i].date);
                    const date3 = parseDKDate(extraPayments[i+2].date);
                    const diffTime = Math.abs(date1 - date3);
                    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
                    if (diffDays <= 30) {
                        hasHattrick = true;
                        break;
                    }
                }
            }
            if (hasHattrick) badgeHattrick.classList.add('unlocked');
            else badgeHattrick.classList.remove('unlocked');
        }

        function renderLog(formatter) {
            const container = document.getElementById('logContainer');
            if (payments.length === 0) {
                container.innerHTML = '<div class="metric-label" style="text-align:center; padding: 20px 0;">Ingen sejre endnu.</div>';
                return;
            }

            let html = '';
            payments.forEach(p => {
                const isEkstra = p.type === 'ekstra';
                html += `
                    <div class="log-item">
                        <div class="log-info">
                            <strong>${p.date}</strong>
                            <span class="metric-label" style="margin:0;">${p.source}</span>
                        </div>
                        <div class="log-actions">
                            <div class="log-amount ${isEkstra ? 'type-ekstra' : 'type-fast'}">
                                ${isEkstra ? '+' : ''}${formatter.format(p.amount)} kr.
                            </div>
                            <button class="btn-delete" onclick="deletePayment('${p.id}')">Slet</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function exportData() {
            if (payments.length === 0) return alert("Ingen data at eksportere.");
            const BOM = "\uFEFF";
            let csvContent = BOM + "Dato;Beløb;Type;Kilde\n"; 
            payments.forEach(p => {
                const safeSource = p.source.replace(/;/g, ',');
                csvContent += `${p.date};${p.amount};${p.type};"${safeSource}"\n`;
            });
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `gaeldsknuser_backup_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            setTimeout(() => URL.revokeObjectURL(url), 100);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
